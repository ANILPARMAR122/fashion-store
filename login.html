<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        /* Inherits your existing variables */
        :root {
            --bg-dark: #0f0f0f;
            --bg-card: #1a1a1a;
            --text-main: #f5f5f5;
            --accent: #dc2626;
            --border: rgba(255, 255, 255, 0.1);
        }
        body { background-color: var(--bg-dark); color: var(--text-main); font-family: 'Montserrat', sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .auth-container { background: var(--bg-card); padding: 50px; border: 1px solid var(--border); border-radius: 8px; width: 100%; max-width: 400px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { font-size: 28px; font-weight: 800; text-decoration: none; color: white; display: block; margin-bottom: 30px; text-transform: uppercase; }
        .logo span { color: var(--accent); }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group input { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--border); color: white; border-radius: 4px; outline: none; transition: 0.3s; }
        .input-group input:focus { border-color: var(--accent); }
        .btn { width: 100%; padding: 15px; background: var(--text-main); color: var(--bg-dark); font-weight: 800; text-transform: uppercase; border: none; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: var(--accent); color: white; }
    </style>
</head>
<body>
    <div class="auth-container">
        <a href="#" class="logo">Men<span>Hub</span></a>
        <form onsubmit="event.preventDefault(); auth.login('demo', 'demo');">
            <div class="input-group">
                <input type="email" placeholder="Email Address" required>
            </div>
            <div class="input-group">
                <input type="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn">Secure Login</button>
        </form>
    </div>
    <script src="auth.js"></script>
</body>
</html>
